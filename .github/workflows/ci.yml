name: ci

on:
  pull_request:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  checks:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: "spike/requirements.txt"

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            app-tauri/src-tauri/target
          key: cargo-${{ runner.os }}-${{ hashFiles('app-tauri/src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Install Python test deps
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r spike/requirements.txt

      - name: Check version metadata
        run: python3 scripts/sync_version.py --check

      - name: Test release metadata scripts
        run: python3 -m unittest discover -s scripts -p 'test_*.py'

      - name: Appcast CLI smoke
        run: |
          set -euo pipefail
          version="$(tr -d '[:space:]' < VERSION)"
          printf 'test-signature\n' > /tmp/slipstream-test.sig
          python3 scripts/make_appcast.py \
            --version "$version" \
            --tag "v$version" \
            --repository "${{ github.repository }}" \
            --signature-file /tmp/slipstream-test.sig \
            --output /tmp/slipstream-latest.json \
            --pub-date 2026-07-08T12:00:00Z
          python3 -m json.tool /tmp/slipstream-latest.json >/dev/null

      - name: Route policy bundle CLI smoke
        run: |
          set -euo pipefail
          python3 scripts/make_route_policy_bundle.py \
            --generate-keypair \
            --key-id ci-test \
            --private-key-output /tmp/slipstream-route-policy.key \
            --public-keys-output /tmp/slipstream-route-policy-keys.json
          python3 scripts/make_route_policy_bundle.py \
            --bundled-manifest \
            --key-id ci-test \
            --private-key-file /tmp/slipstream-route-policy.key \
            --output /tmp/slipstream-route-policy.json \
            --public-keys-output /tmp/slipstream-route-policy-derived-keys.json
          python3 -m json.tool /tmp/slipstream-route-policy.json >/dev/null
          python3 scripts/make_route_policy_bundle.py \
            --verify \
            --bundle /tmp/slipstream-route-policy.json \
            --public-keys /tmp/slipstream-route-policy-keys.json
          python3 scripts/make_route_policy_bundle.py \
            --channel-index \
            --bundle /tmp/slipstream-route-policy.json \
            --bundle-url https://policy.example.org/channel/route-policy.json \
            --output /tmp/slipstream-route-policy-latest.json
          python3 -m json.tool /tmp/slipstream-route-policy-latest.json >/dev/null

      - name: Python compile check
        run: |
          python3 -m py_compile \
            spike/address_attempts.py \
            spike/route_circuit.py \
            spike/routing_policy.py \
            spike/routing_recovery.py \
            spike/tproxy.py \
            spike/xbox_dns.py \
            spike/test_recovery.py \
            spike/test_routing_contract_vectors.py \
            spike/test_traffic_contracts.py \
            spike/test_tproxy_doh.py \
            spike/test_xbox_dns.py \
            scripts/pf_anchor_smoke.py \
            scripts/pf_installed_lifecycle_smoke.py \
            scripts/sync_version.py \
            scripts/make_appcast.py \
            scripts/make_route_policy_bundle.py \
            scripts/verify_release_artifacts.py \
            scripts/test_pf_anchor_smoke.py \
            scripts/test_pf_installed_lifecycle_smoke.py \
            scripts/test_make_appcast.py \
            scripts/test_make_route_policy_bundle.py \
            scripts/test_verify_release_artifacts.py

      - name: Core traffic contracts
        run: python3 -m pytest -q spike/test_traffic_contracts.py

      - name: Daemon unit tests
        run: python3 -m pytest -q spike

      - name: Private PF anchor sentinel smoke
        run: sudo -E "$(command -v python3)" scripts/pf_anchor_smoke.py

      - name: Prepare Tauri test resources
        run: |
          mkdir -p app-tauri/src-tauri/binaries
          printf '#!/bin/sh\nexit 0\n' > app-tauri/src-tauri/binaries/geph5-client-aarch64-apple-darwin
          chmod +x app-tauri/src-tauri/binaries/geph5-client-aarch64-apple-darwin
          mkdir -p app-tauri/src-tauri/slipstreamd
          printf '#!/bin/sh\nexit 0\n' > app-tauri/src-tauri/slipstreamd/slipstreamd
          chmod +x app-tauri/src-tauri/slipstreamd/slipstreamd

      - name: Rust tray tests
        working-directory: app-tauri/src-tauri
        run: cargo test

      - name: Installed daemon lifecycle sentinel smoke
        env:
          SLIPSTREAM_DISPOSABLE_CI: "1"
        run: sudo -E "$(command -v python3)" scripts/pf_installed_lifecycle_smoke.py

  packaged-app-lifecycle:
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app-tauri/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: spike/requirements.txt

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            app-tauri/src-tauri/target
          key: cargo-packaged-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('app-tauri/src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-packaged-${{ runner.os }}-${{ runner.arch }}-
            cargo-${{ runner.os }}-

      - name: Require the production architecture
        run: |
          set -euo pipefail
          test "$(uname -m)" = arm64

      - name: Build the frozen daemon
        run: |
          set -euo pipefail
          python3 -m venv spike/.buildvenv
          spike/.buildvenv/bin/pip install --quiet --disable-pip-version-check \
            -r spike/requirements.txt pyinstaller
          spike/.buildvenv/bin/python scripts/make_route_policy_bundle.py \
            --generate-keypair \
            --key-id ci-packaged-lifecycle \
            --private-key-output /tmp/slipstream-route-policy.key \
            --public-keys-output spike/route-policy-keys.json
          ( cd spike && .buildvenv/bin/pyinstaller --noconfirm --clean slipstreamd.spec )
          rm -rf app-tauri/src-tauri/slipstreamd
          cp -R spike/dist/slipstreamd app-tauri/src-tauri/slipstreamd
          test -x app-tauri/src-tauri/slipstreamd/slipstreamd
          /usr/bin/lipo app-tauri/src-tauri/slipstreamd/slipstreamd \
            -verify_arch arm64

      - name: Fetch the recorded Geph build
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          version="$(tr -d '[:space:]' < vendor/geph/VERSION)"
          tag="geph-vendor-$version"
          mkdir -p app-tauri/src-tauri/binaries /tmp/geph
          gh release download "$tag" --repo "${{ github.repository }}" \
            --pattern geph5-client --dir /tmp/geph
          cp /tmp/geph/geph5-client \
            app-tauri/src-tauri/binaries/geph5-client-aarch64-apple-darwin
          chmod +x app-tauri/src-tauri/binaries/geph5-client-aarch64-apple-darwin
          /usr/bin/lipo \
            app-tauri/src-tauri/binaries/geph5-client-aarch64-apple-darwin \
            -verify_arch arm64

      - name: Build the packaged app
        working-directory: app-tauri
        run: |
          set -euo pipefail
          npm ci
          npm run build:local -- --bundles app

      - name: Verify packaged resources
        run: |
          set -euo pipefail
          app="app-tauri/src-tauri/target/release/bundle/macos/Slipstream.app"
          test -d "$app"
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$app/Contents/Info.plist")" \
            = "$(tr -d '[:space:]' < VERSION)"
          /usr/bin/lipo "$app/Contents/MacOS/slipstream" -verify_arch arm64
          /usr/bin/lipo "$app/Contents/Resources/slipstreamd/slipstreamd" \
            -verify_arch arm64
          /usr/bin/lipo "$app/Contents/MacOS/geph5-client" -verify_arch arm64
          /usr/bin/codesign --verify --deep --strict "$app"

      - name: Packaged lifecycle, tray-crash, Chrome, and Safari sentinel smoke
        env:
          SLIPSTREAM_DISPOSABLE_CI: "1"
        run: |
          bash scripts/run_packaged_lifecycle_smoke.sh \
            app-tauri/src-tauri/target/release/bundle/macos/Slipstream.app

      - name: Package the qualified app
        run: |
          set -euo pipefail
          mkdir -p dist-ci
          ditto -c -k --keepParent \
            app-tauri/src-tauri/target/release/bundle/macos/Slipstream.app \
            dist-ci/Slipstream-packaged-lifecycle.zip

      - uses: actions/upload-artifact@v4
        with:
          name: Slipstream-packaged-lifecycle-${{ github.sha }}
          path: dist-ci/Slipstream-packaged-lifecycle.zip
          if-no-files-found: error
          retention-days: 7
