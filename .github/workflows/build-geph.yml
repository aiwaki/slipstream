# Build the headless geph5-client and publish it as a vendored binary that the
# Slipstream app bundles. This is how we "embed geph without installing it
# separately": CI (which HAS Rust + network) compiles geph5-client from the
# MPL-2.0 source, and the app-build workflow drops the result into
# Slipstream.app/Contents/Resources. The scheduled run watches geph upstream for
# new `geph5-client-v*` tags and rebuilds automatically -> users get geph
# bugfixes through Slipstream's own auto-update, with nothing to install by hand.
#
# geph5-client is MPL-2.0 (file-level copyleft). Redistributing the unmodified
# binary inside a larger MIT app is allowed; we ship geph's LICENSE alongside it
# and link the source (compliance handled in the `license` step).
name: build-geph

on:
  workflow_dispatch:            # manual trigger
  schedule:
    - cron: "17 6 * * *"        # daily: catch a new geph5-client release
  push:
    paths:
      - ".github/workflows/build-geph.yml"

permissions:
  contents: write               # publish the vendored binary as a release asset

env:
  GEPH_REPO: geph-official/geph5

jobs:
  # 1) Find the latest upstream geph5-client tag; rebuild only when it differs
  #    from what we've already vendored (vendor/geph/VERSION).
  resolve:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.up.outputs.version }}
      should_build: ${{ steps.cmp.outputs.should_build }}
    steps:
      - uses: actions/checkout@v4
      - id: up
        name: Resolve latest geph5-client version (crates.io)
        run: |
          # geph-official/geph5 does NOT publish geph5-client-v* git tags (it tags
          # individual workspace crates like sillad-v*). crates.io is the source of
          # truth and what `cargo install` builds, so resolve the version there.
          # crates.io returns 403 without a descriptive User-Agent (their policy).
          ver=$(curl -fsSL -A "slipstream-ci (+https://github.com/aiwaki/slipstream)" \
            "https://crates.io/api/v1/crates/geph5-client" \
            | python3 -c 'import sys,json; print(json.load(sys.stdin)["crate"]["max_version"])')
          echo "Latest crates.io version: ${ver:-<none>}"
          [ -n "$ver" ] || { echo "no geph5-client version found on crates.io"; exit 1; }
          echo "version=$ver" >> "$GITHUB_OUTPUT"
      - id: cmp
        name: Compare with vendored version
        run: |
          have=$(cat vendor/geph/VERSION 2>/dev/null || echo "")
          want="${{ steps.up.outputs.version }}"
          echo "vendored=$have wanted=$want"
          if [ "$have" = "$want" ]; then
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

  # 2) Build geph5-client per platform. macOS = universal (arm64 + x86_64).
  #    The matrix is the cross-platform seam: add linux/windows/android targets
  #    here later (the user's portability requirement) without touching the rest.
  build:
    needs: resolve
    if: needs.resolve.outputs.should_build == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            name: macos-universal
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
          # --- cross-platform (enable when we tackle each OS) ---
          # - os: ubuntu-latest
          #   name: linux-x86_64
          #   rust_targets: x86_64-unknown-linux-gnu
          # - os: windows-latest
          #   name: windows-x86_64
          #   rust_targets: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable) + targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: geph-${{ matrix.name }}-${{ needs.resolve.outputs.version }}

      - name: Build deps (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf cmake pkg-config || true

      - name: Build geph5-client ${{ needs.resolve.outputs.version }} from crates.io
        run: |
          set -euo pipefail
          VER="${{ needs.resolve.outputs.version }}"
          IFS=',' read -ra TARGETS <<< "${{ matrix.rust_targets }}"
          mkdir -p out
          bins=()
          for t in "${TARGETS[@]}"; do
            echo "::group::cargo install geph5-client@$VER ($t)"
            # crates.io is the only release channel (no git tags); cargo install
            # downloads + builds the published crate. --no-track keeps it stateless;
            # --force lets a re-run overwrite a cached install root.
            cargo install geph5-client --version "$VER" --target "$t" \
              --root "install-$t" --no-track --force
            bins+=("install-$t/bin/geph5-client")
            echo "::endgroup::"
          done
          if [ "${{ runner.os }}" = "macOS" ]; then
            lipo -create -output out/geph5-client "${bins[@]}"
            strip -x out/geph5-client
            lipo -info out/geph5-client
          elif [ "${{ runner.os }}" = "Windows" ]; then
            cp "${bins[0]}.exe" out/geph5-client.exe
          else
            cp "${bins[0]}" out/geph5-client
          fi

      - name: Bundle MPL-2.0 license (compliance)
        run: |
          # cargo install doesn't retain the source LICENSE, so ship the canonical
          # MPL-2.0 text (binary is the unmodified upstream build).
          curl -fsSL https://www.mozilla.org/media/MPL/2.0/index.txt \
            -o out/geph5-client.LICENSE \
            || echo "geph5-client is MPL-2.0 (https://www.mozilla.org/MPL/2.0/); source: https://github.com/${GEPH_REPO}, crate: https://crates.io/crates/geph5-client" > out/geph5-client.LICENSE
          echo "${{ needs.resolve.outputs.version }}" > out/geph5-client.VERSION
          ( cd out && shasum -a 256 geph5-client* > SHA256SUMS )

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: geph5-client-${{ matrix.name }}
          path: out/*

      - name: Publish vendored binary as a release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: geph-vendor-${{ needs.resolve.outputs.version }}
          name: "geph5-client ${{ needs.resolve.outputs.version }} (vendored)"
          body: |
            Headless geph5-client built from ${{ env.GEPH_REPO }}@${{ needs.resolve.outputs.version }}
            for embedding in Slipstream. MPL-2.0; source linked above.
            Consumed by the app-build workflow -> Slipstream.app/Contents/Resources.
          files: out/*

  # 3) Record the version we vendored so the next scheduled run is a no-op until
  #    geph ships something newer.
  bump:
    needs: [resolve, build]
    if: needs.resolve.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bump vendor/geph/VERSION
        run: |
          echo "${{ needs.resolve.outputs.version }}" > vendor/geph/VERSION
          git config user.name  "slipstream-ci"
          git config user.email "ci@slipstream.local"
          git add vendor/geph/VERSION
          git commit -m "vendor: geph5-client ${{ needs.resolve.outputs.version }}" || echo "no change"
          git push || echo "push skipped (no remote/perms)"
