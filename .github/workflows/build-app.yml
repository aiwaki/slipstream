# Build, sign, and publish Slipstream.app + the auto-update appcast.
#
# Produces a complete self-installing bundle: the tray app + the vendored
# geph5-client (from build-geph.yml's `geph-vendor-*` release) + the frozen
# `slipstreamd` daemon (built here with PyInstaller). The bundle is signed with the
# updater key (TAURI_SIGNING_PRIVATE_KEY secret; its public half is in
# tauri.conf.json) and published as a GitHub Release, along with a `latest.json`
# appcast at the URL the app's updater polls
# (releases/latest/download/latest.json). Existing installs then auto-update.
# It also publishes signed route-policy assets for the opt-in remote-policy
# channel. The app does not enable that channel by default; this only gives
# reviewed releases a signed, hash-checked policy bundle to point at later.
#
# NOTE: the .app is NOT Apple-notarized (no Developer ID), so a FIRST download
# still hits Gatekeeper (right-click > Open). The updater signature is minisign,
# separate from Apple codesigning — it only guarantees update integrity.
name: build-app

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Optional version override; must match VERSION. Manual runs produce prereleases."
        required: false
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  build:
    runs-on: macos-14
    env:
      SLIPSTREAM_TAURI_TARGET: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13.14"
          cache: pip
          cache-dependency-path: spike/requirements-build.txt

      - name: Resolve version + tag
        id: ver
        run: |
          repo_v="$(tr -d '[:space:]' < VERSION)"
          if [ "${{ github.event_name }}" = "push" ]; then
            v="${GITHUB_REF_NAME#v}"; tag="${GITHUB_REF_NAME}"
            [ "$v" = "$repo_v" ] || { echo "tag $tag does not match VERSION ($repo_v)"; exit 1; }
            channel="stable"
            prerelease="false"
            make_latest="true"
            release_name="Slipstream $v"
          else
            [ "$GITHUB_REF" = "refs/heads/main" ] || {
              echo "manual preview releases must run from refs/heads/main"
              exit 1
            }
            input_v="${{ github.event.inputs.version }}"
            if [ -n "$input_v" ] && [ "$input_v" != "$repo_v" ]; then
              echo "workflow version $input_v does not match VERSION ($repo_v)"
              exit 1
            fi
            v="$repo_v"
            tag="v${v}-preview.${GITHUB_RUN_NUMBER}"
            channel="preview"
            prerelease="true"
            make_latest="false"
            release_name="Slipstream $v (preview ${GITHUB_RUN_NUMBER})"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "channel=$channel" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"
          echo "make_latest=$make_latest" >> "$GITHUB_OUTPUT"
          echo "release_name=$release_name" >> "$GITHUB_OUTPUT"
          echo "source_date_epoch=$(git show -s --format=%ct "$GITHUB_SHA")" >> "$GITHUB_OUTPUT"
          echo "Releasing $v ($tag, $channel)"

      - name: Resolve previous app release tag
        id: previous
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          current_tag="${{ steps.ver.outputs.tag }}"
          if [ "${{ steps.ver.outputs.channel }}" = "preview" ]; then
            prerelease=true
          else
            prerelease=false
          fi
          filter=".[] | select(.draft | not) | select(.tag_name != \"$current_tag\") | select(.tag_name | startswith(\"v\")) | select(.prerelease == $prerelease) | .tag_name"
          previous_tag="$(gh api --paginate "repos/${{ github.repository }}/releases?per_page=100" --jq "$filter" | sed -n '1p')"
          echo "tag=$previous_tag" >> "$GITHUB_OUTPUT"
          echo "Previous app release: ${previous_tag:-none}"

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable-2026-06-30
        with:
          targets: aarch64-apple-darwin

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"

      - name: System build deps
        run: bash scripts/ensure_macos_build_deps.sh

      - name: Prepare route policy trust keys
        if: steps.ver.outputs.channel == 'stable'
        env:
          SLIP_ROUTE_POLICY_PUBLIC_KEYS_JSON: ${{ secrets.SLIP_ROUTE_POLICY_PUBLIC_KEYS_JSON }}
        run: |
          set -euo pipefail
          : "${SLIP_ROUTE_POLICY_PUBLIC_KEYS_JSON:?missing SLIP_ROUTE_POLICY_PUBLIC_KEYS_JSON}"
          printf '%s\n' "$SLIP_ROUTE_POLICY_PUBLIC_KEYS_JSON" > spike/route-policy-keys.json
          python3 -m json.tool spike/route-policy-keys.json >/dev/null

      - name: Build the self-contained daemon (slipstreamd, PyInstaller)
        run: |
          set -euo pipefail
          python3 -m venv spike/.buildvenv
          spike/.buildvenv/bin/python -m pip install \
            --quiet \
            --disable-pip-version-check \
            --only-binary=:all: \
            --require-hashes \
            -r spike/requirements-build.txt
          ( cd spike && .buildvenv/bin/pyinstaller --noconfirm --clean slipstreamd.spec )
          rm -rf app-tauri/src-tauri/slipstreamd
          cp -R spike/dist/slipstreamd app-tauri/src-tauri/slipstreamd
          test -x app-tauri/src-tauri/slipstreamd/slipstreamd

      - name: Fetch vendored geph5-client (from build-geph.yml)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          version="$(tr -d '[:space:]' < vendor/geph/VERSION)"
          release_revision="$(python3 -c 'import json; print(json.load(open("vendor/geph/SOURCE.json"))["release_revision"])')"
          tag="geph-vendor-$version-r$release_revision"
          echo "using geph vendor tag: $tag"
          rm -rf /tmp/geph
          mkdir -p app-tauri/src-tauri/binaries /tmp/geph
          gh release download "$tag" --repo "${{ github.repository }}" \
            --pattern 'geph5-client' \
            --pattern 'geph5-client.VERSION' \
            --pattern 'geph5-client.LICENSE' \
            --pattern 'geph5-client.SOURCE.json' \
            --pattern 'geph5-client.Cargo.lock' \
            --pattern 'geph5-client.spdx.json' \
            --pattern 'geph5-client-dependency-audit.json' \
            --pattern 'SHA256SUMS' \
            --dir /tmp/geph
          asset_version="$(tr -d '[:space:]' < /tmp/geph/geph5-client.VERSION)"
          [ "$asset_version" = "$version" ] || {
            echo "vendored Geph version mismatch: expected $version, got $asset_version"
            exit 1
          }
          ( cd /tmp/geph && shasum -a 256 -c SHA256SUMS )
          cmp /tmp/geph/geph5-client.SOURCE.json vendor/geph/SOURCE.json
          cmp /tmp/geph/geph5-client.Cargo.lock vendor/geph/Cargo.lock
          cmp /tmp/geph/geph5-client.LICENSE vendor/geph/LICENSE
          vendor_commit="$(python3 -c 'import json; print(json.load(open("/tmp/geph/geph5-client-dependency-audit.json"))["source"]["commit"])')"
          tag_commit="$(gh api "repos/${{ github.repository }}/commits/$tag" --jq .sha)"
          [ "$vendor_commit" = "$tag_commit" ] || {
            echo "Geph audit source commit does not match immutable tag $tag"; exit 1;
          }
          python3 scripts/make_geph_vendor_sbom.py verify \
            --source /tmp/geph/geph5-client.SOURCE.json \
            --version-file /tmp/geph/geph5-client.VERSION \
            --cargo-lock /tmp/geph/geph5-client.Cargo.lock \
            --repository "${{ github.repository }}" \
            --source-commit "$vendor_commit" \
            --target macos-universal \
            --sbom /tmp/geph/geph5-client.spdx.json
          python3 scripts/dependency_audit.py verify \
            --report /tmp/geph/geph5-client-dependency-audit.json \
            --sbom /tmp/geph/geph5-client.spdx.json \
            --policy security/geph-dependency-audit-policy.json \
            --source-commit "$vendor_commit" \
            --target macos-universal \
            --vendored-transitive-dependencies full
          signer_workflow="${{ github.repository }}/.github/workflows/build-geph.yml"
          for artifact in /tmp/geph/*; do
            gh attestation verify "$artifact" \
              --repo "${{ github.repository }}" \
              --signer-workflow "$signer_workflow" \
              --source-digest "$vendor_commit" \
              --deny-self-hosted-runners >/dev/null
          done
          gh attestation verify /tmp/geph/geph5-client \
            --repo "${{ github.repository }}" \
            --signer-workflow "$signer_workflow" \
            --source-digest "$vendor_commit" \
            --predicate-type https://spdx.dev/Document/v2.3 \
            --deny-self-hosted-runners >/dev/null
          python3 scripts/dependency_audit.py fetch-scanner \
            --policy security/geph-dependency-audit-policy.json \
            --platform darwin-arm64 \
            --output /tmp/geph/osv-scanner
          python3 scripts/dependency_audit.py scan \
            --scanner /tmp/geph/osv-scanner \
            --platform darwin-arm64 \
            --sbom /tmp/geph/geph5-client.spdx.json \
            --policy security/geph-dependency-audit-policy.json \
            --source-commit "$vendor_commit" \
            --target macos-universal \
            --vendored-transitive-dependencies full \
            --evaluation-date "$(date -u +%F)" \
            --output /tmp/geph/geph5-client-current-audit.json
          python3 scripts/dependency_audit.py verify \
            --report /tmp/geph/geph5-client-current-audit.json \
            --sbom /tmp/geph/geph5-client.spdx.json \
            --policy security/geph-dependency-audit-policy.json \
            --source-commit "$vendor_commit" \
            --target macos-universal \
            --vendored-transitive-dependencies full
          cp /tmp/geph/geph5-client \
            app-tauri/src-tauri/binaries/geph5-client-aarch64-apple-darwin
          chmod +x app-tauri/src-tauri/binaries/geph5-client-aarch64-apple-darwin
          /usr/bin/lipo \
            app-tauri/src-tauri/binaries/geph5-client-aarch64-apple-darwin \
            -verify_arch arm64

      - name: Check version metadata
        run: python3 scripts/sync_version.py --check

      - name: Test release metadata scripts
        run: spike/.buildvenv/bin/python -m unittest discover -s scripts -p 'test_*.py'

      - name: Build + sign the app
        working-directory: app-tauri
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          npm ci
          npm run build

      - name: Qualify the release app lifecycle, tray crash, Chrome, and Safari
        env:
          SLIPSTREAM_DISPOSABLE_CI: "1"
        run: |
          set -euo pipefail
          app="app-tauri/src-tauri/target/${SLIPSTREAM_TAURI_TARGET}/release/bundle/macos/Slipstream.app"
          test -d "$app"
          bash scripts/run_packaged_lifecycle_smoke.sh "$app"

      - name: Package + build the update appcast (latest.json)
        id: pkg
        run: |
          set -euo pipefail
          B="app-tauri/src-tauri/target/${SLIPSTREAM_TAURI_TARGET}/release/bundle"
          OUT=dist-release; mkdir -p "$OUT"
          # a plain zip of the .app for first-time downloads (no DMG friction)
          ditto -c -k --keepParent "$B/macos/Slipstream.app" "$OUT/Slipstream-macos-arm64.zip"
          for dmg in "$B"/dmg/*.dmg; do
            [ -e "$dmg" ] || continue
            cp "$dmg" "$OUT/"
          done
          # updater artifacts (tauri produced these because a signing key was set)
          cp "$B/macos/Slipstream.app.tar.gz" "$OUT/"
          cp "$B/macos/Slipstream.app.tar.gz.sig" "$OUT/"
          python3 scripts/make_appcast.py \
            --version "${{ steps.ver.outputs.version }}" \
            --tag "${{ steps.ver.outputs.tag }}" \
            --repository "${{ github.repository }}" \
            --signature-file "$B/macos/Slipstream.app.tar.gz.sig" \
            --output "$OUT/latest.json"
          echo "made appcast:"; cat "$OUT/latest.json"

      - name: Package signed route policy channel
        if: steps.ver.outputs.channel == 'stable'
        env:
          SLIP_ROUTE_POLICY_KEY_ID: ${{ secrets.SLIP_ROUTE_POLICY_KEY_ID }}
          SLIP_ROUTE_POLICY_PRIVATE_KEY: ${{ secrets.SLIP_ROUTE_POLICY_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          : "${SLIP_ROUTE_POLICY_KEY_ID:?missing SLIP_ROUTE_POLICY_KEY_ID}"
          : "${SLIP_ROUTE_POLICY_PRIVATE_KEY:?missing SLIP_ROUTE_POLICY_PRIVATE_KEY}"
          OUT=dist-release
          key_file="$(mktemp)"
          trap 'rm -f "$key_file" "$OUT/route-policy-derived-keys.json"' EXIT
          umask 077
          printf '%s\n' "$SLIP_ROUTE_POLICY_PRIVATE_KEY" > "$key_file"
          spike/.buildvenv/bin/python scripts/make_route_policy_bundle.py \
            --bundled-manifest \
            --key-id "$SLIP_ROUTE_POLICY_KEY_ID" \
            --private-key-file "$key_file" \
            --output "$OUT/route-policy.json" \
            --public-keys-output "$OUT/route-policy-derived-keys.json"
          spike/.buildvenv/bin/python scripts/make_route_policy_bundle.py \
            --verify \
            --bundle "$OUT/route-policy.json" \
            --public-keys spike/route-policy-keys.json
          spike/.buildvenv/bin/python scripts/make_route_policy_bundle.py \
            --channel-index \
            --bundle "$OUT/route-policy.json" \
            --bundle-url "https://github.com/${{ github.repository }}/releases/download/${{ steps.ver.outputs.tag }}/route-policy.json" \
            --output "$OUT/route-policy-latest.json"
          cp spike/route-policy-keys.json "$OUT/route-policy-keys.json"
          python3 -m json.tool "$OUT/route-policy.json" >/dev/null
          python3 -m json.tool "$OUT/route-policy-latest.json" >/dev/null
          python3 -m json.tool "$OUT/route-policy-keys.json" >/dev/null

      - name: Resolve target dependency graph
        run: |
          set -euo pipefail
          cargo metadata \
            --manifest-path app-tauri/src-tauri/Cargo.toml \
            --locked \
            --filter-platform "$SLIPSTREAM_TAURI_TARGET" \
            --format-version 1 \
            > /tmp/slipstream-cargo-metadata.json

      - name: Build deterministic target SPDX SBOM
        run: |
          set -euo pipefail
          spike/.buildvenv/bin/python scripts/make_release_sbom.py \
            --version "${{ steps.ver.outputs.version }}" \
            --tag "${{ steps.ver.outputs.tag }}" \
            --repository "${{ github.repository }}" \
            --source-commit "$GITHUB_SHA" \
            --source-date-epoch "${{ steps.ver.outputs.source_date_epoch }}" \
            --target "$SLIPSTREAM_TAURI_TARGET" \
            --cargo-lock app-tauri/src-tauri/Cargo.lock \
            --cargo-metadata /tmp/slipstream-cargo-metadata.json \
            --npm-lock app-tauri/package-lock.json \
            --python-lock spike/requirements-runtime.txt \
            --geph-version-file vendor/geph/VERSION \
            --geph-source-file vendor/geph/SOURCE.json \
            --tg-ws-proxy-version-file vendor/tg-ws-proxy/VERSION \
            --output dist-release/Slipstream.spdx.json

      - name: Audit release dependencies
        run: |
          set -euo pipefail
          audit_date="$(date -u +%F)"
          scanner=/tmp/osv-scanner
          spike/.buildvenv/bin/python scripts/dependency_audit.py fetch-scanner \
            --policy security/dependency-audit-policy.json \
            --platform darwin-arm64 \
            --output "$scanner"
          spike/.buildvenv/bin/python scripts/dependency_audit.py scan \
            --scanner "$scanner" \
            --platform darwin-arm64 \
            --sbom dist-release/Slipstream.spdx.json \
            --policy security/dependency-audit-policy.json \
            --source-commit "$GITHUB_SHA" \
            --target "$SLIPSTREAM_TAURI_TARGET" \
            --evaluation-date "$audit_date" \
            --output dist-release/dependency-audit.json
          spike/.buildvenv/bin/python scripts/dependency_audit.py verify \
            --report dist-release/dependency-audit.json \
            --sbom dist-release/Slipstream.spdx.json \
            --policy security/dependency-audit-policy.json \
            --source-commit "$GITHUB_SHA" \
            --target "$SLIPSTREAM_TAURI_TARGET"

      - name: Build release artifact manifest
        run: |
          set -euo pipefail
          spike/.buildvenv/bin/python scripts/make_release_manifest.py \
            --release-dir dist-release \
            --repository "${{ github.repository }}" \
            --version "${{ steps.ver.outputs.version }}" \
            --tag "${{ steps.ver.outputs.tag }}" \
            --channel "${{ steps.ver.outputs.channel }}" \
            --source-commit "$GITHUB_SHA" \
            --source-date-epoch "${{ steps.ver.outputs.source_date_epoch }}" \
            --target "$SLIPSTREAM_TAURI_TARGET"

      - name: Verify release artifacts
        run: |
          set -euo pipefail
          spike/.buildvenv/bin/python scripts/verify_release_artifacts.py \
            --release-dir dist-release \
            --repository "${{ github.repository }}" \
            --tag "${{ steps.ver.outputs.tag }}" \
            --version "${{ steps.ver.outputs.version }}" \
            --channel "${{ steps.ver.outputs.channel }}" \
            --source-commit "$GITHUB_SHA" \
            --target "$SLIPSTREAM_TAURI_TARGET"

      - name: Attest verified release provenance
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: dist-release/*

      - name: Attest application SBOM
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: |
            dist-release/Slipstream-macos-arm64.zip
            dist-release/Slipstream.app.tar.gz
            dist-release/Slipstream_*.dmg
          sbom-path: dist-release/Slipstream.spdx.json

      - name: Verify stored release attestations
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          signer_workflow="${{ github.repository }}/.github/workflows/build-app.yml"
          for artifact in dist-release/*; do
            gh attestation verify "$artifact" \
              --repo "${{ github.repository }}" \
              --signer-workflow "$signer_workflow" \
              --source-digest "$GITHUB_SHA" \
              --deny-self-hosted-runners >/dev/null
          done
          app_artifacts=(
            dist-release/Slipstream-macos-arm64.zip
            dist-release/Slipstream.app.tar.gz
          )
          for dmg in dist-release/Slipstream_*.dmg; do
            [ -e "$dmg" ] && app_artifacts+=("$dmg")
          done
          for artifact in "${app_artifacts[@]}"; do
            gh attestation verify "$artifact" \
              --repo "${{ github.repository }}" \
              --signer-workflow "$signer_workflow" \
              --source-digest "$GITHUB_SHA" \
              --predicate-type https://spdx.dev/Document/v2.3 \
              --deny-self-hosted-runners >/dev/null
          done

      - name: Write release notes
        run: |
          set -euo pipefail
          if [ "${{ steps.ver.outputs.channel }}" = "preview" ]; then
            printf '%s\n\n%s\n%s\n%s\n%s\n%s\n\n%s\n' \
              "Предварительная сборка Slipstream ${{ steps.ver.outputs.version }} для macOS Apple Silicon." \
              "- \`Slipstream-macos-arm64.zip\` — приложение для первой установки." \
              "- \`artifact-manifest.json\` — SHA-256 и размеры файлов релиза." \
              "- \`Slipstream.spdx.json\` — состав зависимостей." \
              "- \`dependency-audit.json\` — результат проверки опубликованного SBOM." \
              "- \`gh attestation verify Slipstream-macos-arm64.zip --repo ${{ github.repository }}\` — проверка provenance." \
              "Сборка устанавливается вручную, не заменяет stable-канал и не содержит remote policy assets. Нотарификация Apple пока отсутствует." \
              > dist-release/release-notes.md
          else
            printf '%s\n\n%s\n%s\n%s\n%s\n%s\n\n%s\n' \
              "Slipstream ${{ steps.ver.outputs.version }} для macOS Apple Silicon." \
              "- \`Slipstream-macos-arm64.zip\` — приложение для первой установки." \
              "- \`artifact-manifest.json\` — SHA-256 и размеры файлов релиза." \
              "- \`Slipstream.spdx.json\` — состав зависимостей." \
              "- \`dependency-audit.json\` — результат проверки опубликованного SBOM." \
              "- \`gh attestation verify Slipstream-macos-arm64.zip --repo ${{ github.repository }}\` — проверка provenance." \
              "Сборка опубликована в stable-канале вместе с подписанным каналом route policy. Нотарификация Apple пока отсутствует." \
              > dist-release/release-notes.md
          fi

      - name: Publish release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.ver.outputs.release_name }}
          prerelease: ${{ steps.ver.outputs.prerelease }}
          make_latest: ${{ steps.ver.outputs.make_latest }}
          body_path: dist-release/release-notes.md
          generate_release_notes: true
          previous_tag: ${{ steps.previous.outputs.tag }}
          files: |
            dist-release/Slipstream-macos-arm64.zip
            dist-release/Slipstream.app.tar.gz
            dist-release/Slipstream.app.tar.gz.sig
            dist-release/latest.json
            dist-release/artifact-manifest.json
            dist-release/Slipstream.spdx.json
            dist-release/dependency-audit.json
            dist-release/route-policy.json
            dist-release/route-policy-latest.json
            dist-release/route-policy-keys.json
            dist-release/*.dmg
