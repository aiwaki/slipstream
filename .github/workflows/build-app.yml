# Build, sign, and publish Slipstream.app + the auto-update appcast.
#
# Produces a complete self-installing bundle: the tray app + the vendored
# geph5-client (from build-geph.yml's `geph-vendor-*` release) + the frozen
# `slipstreamd` daemon (built here with PyInstaller). The bundle is signed with the
# updater key (TAURI_SIGNING_PRIVATE_KEY secret; its public half is in
# tauri.conf.json) and published as a GitHub Release, along with a `latest.json`
# appcast at the URL the app's updater polls
# (releases/latest/download/latest.json). Existing installs then auto-update.
#
# NOTE: the .app is NOT Apple-notarized (no Developer ID), so a FIRST download
# still hits Gatekeeper (right-click > Open). The updater signature is minisign,
# separate from Apple codesigning — it only guarantees update integrity.
name: build-app

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Optional version override; must match VERSION, e.g. 0.1.4"
        required: false
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version + tag
        id: ver
        run: |
          repo_v="$(tr -d '[:space:]' < VERSION)"
          if [ "${{ github.event_name }}" = "push" ]; then
            v="${GITHUB_REF_NAME#v}"; tag="${GITHUB_REF_NAME}"
            [ "$v" = "$repo_v" ] || { echo "tag $tag does not match VERSION ($repo_v)"; exit 1; }
          else
            input_v="${{ github.event.inputs.version }}"
            if [ -n "$input_v" ] && [ "$input_v" != "$repo_v" ]; then
              echo "workflow version $input_v does not match VERSION ($repo_v)"
              exit 1
            fi
            v="$repo_v"; tag="v${v}"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Releasing $v ($tag)"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: System build deps
        run: brew install protobuf cmake pkg-config || true

      - name: Build the self-contained daemon (slipstreamd, PyInstaller)
        run: |
          set -euo pipefail
          python3 -m venv spike/.buildvenv
          spike/.buildvenv/bin/pip install --quiet --disable-pip-version-check \
            scapy cryptography certifi pyinstaller
          ( cd spike && .buildvenv/bin/pyinstaller --noconfirm --clean slipstreamd.spec )
          rm -rf app-tauri/src-tauri/slipstreamd
          cp -R spike/dist/slipstreamd app-tauri/src-tauri/slipstreamd
          test -x app-tauri/src-tauri/slipstreamd/slipstreamd

      - name: Fetch vendored geph5-client (from build-geph.yml)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # pick the newest geph-vendor-* release TAG (release list's first column is
          # the title, not the tag, so query tag_name directly).
          tag=$(gh api "repos/${{ github.repository }}/releases" --paginate \
            --jq '[.[].tag_name | select(startswith("geph-vendor-"))] | first // empty')
          [ -n "$tag" ] || { echo "no geph-vendor release yet — run build-geph first"; exit 1; }
          echo "using geph vendor tag: $tag"
          mkdir -p app-tauri/src-tauri/binaries /tmp/geph
          gh release download "$tag" --repo "${{ github.repository }}" \
            --pattern 'geph5-client' --dir /tmp/geph
          cp /tmp/geph/geph5-client \
            app-tauri/src-tauri/binaries/geph5-client-aarch64-apple-darwin
          chmod +x app-tauri/src-tauri/binaries/geph5-client-aarch64-apple-darwin

      - name: Check version metadata
        run: python3 scripts/sync_version.py --check

      - name: Test release metadata scripts
        run: python3 -m unittest discover -s scripts -p 'test_*.py'

      - name: Build + sign the app
        working-directory: app-tauri
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          npm ci
          npm run build

      - name: Package + build the update appcast (latest.json)
        id: pkg
        run: |
          set -euo pipefail
          B=app-tauri/src-tauri/target/release/bundle
          OUT=dist-release; mkdir -p "$OUT"
          # a plain zip of the .app for first-time downloads (no DMG friction)
          ditto -c -k --keepParent "$B/macos/Slipstream.app" "$OUT/Slipstream-macos-arm64.zip"
          cp "$B/dmg/"*.dmg "$OUT/" 2>/dev/null || true
          # updater artifacts (tauri produced these because a signing key was set)
          cp "$B/macos/Slipstream.app.tar.gz" "$OUT/"
          cp "$B/macos/Slipstream.app.tar.gz.sig" "$OUT/"
          python3 scripts/make_appcast.py \
            --version "${{ steps.ver.outputs.version }}" \
            --tag "${{ steps.ver.outputs.tag }}" \
            --repository "${{ github.repository }}" \
            --signature-file "$B/macos/Slipstream.app.tar.gz.sig" \
            --output "$OUT/latest.json"
          echo "made appcast:"; cat "$OUT/latest.json"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: "Slipstream ${{ steps.ver.outputs.version }}"
          body: |
            Slipstream ${{ steps.ver.outputs.version }} (macOS, Apple Silicon).
            Unsigned by Apple — on first download, right-click the app > Open.
            Existing installs auto-update via the built-in updater.
          files: |
            dist-release/Slipstream-macos-arm64.zip
            dist-release/Slipstream.app.tar.gz
            dist-release/Slipstream.app.tar.gz.sig
            dist-release/latest.json
            dist-release/*.dmg
